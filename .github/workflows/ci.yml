name: CI

on:
  workflow_call:
  pull_request:
  push:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate_garak_lock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate platform-specific Garak lock files exist
        run: |
          MISSING_FILES=0
          for arch in amd64 arm64; do
            if [ ! -f "garak-requirements-lock-${arch}.txt" ]; then
              echo "❌ Error: garak-requirements-lock-${arch}.txt not found"
              MISSING_FILES=$((MISSING_FILES + 1))
            else
              echo "✅ Found garak-requirements-lock-${arch}.txt with $(wc -l < garak-requirements-lock-${arch}.txt) dependencies"
            fi
          done

          if [ $MISSING_FILES -gt 0 ]; then
            echo "Run update-garak-lock.sh on each platform to generate lock files"
            exit 1
          fi

      - name: Check AMD64 lock file contains required packages
        run: |
          echo "Checking AMD64 lock file..."
          for pkg in garak torch transformers litellm; do
            if ! grep -q "^${pkg}==" garak-requirements-lock-amd64.txt; then
              echo "❌ Required package $pkg not found in AMD64 lock file"
              exit 1
            fi
            echo "✅ Found: $(grep "^${pkg}==" garak-requirements-lock-amd64.txt)"
          done

      - name: Check ARM64 lock file contains required packages
        run: |
          echo "Checking ARM64 lock file..."
          for pkg in garak torch transformers litellm; do
            if ! grep -q "^${pkg}==" garak-requirements-lock-arm64.txt; then
              echo "❌ Required package $pkg not found in ARM64 lock file"
              exit 1
            fi
            echo "✅ Found: $(grep "^${pkg}==" garak-requirements-lock-arm64.txt)"
          done

  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  rspec:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: scanner
          POSTGRES_PASSWORD: scanner_test_password
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U scanner -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup test database
        env:
          RAILS_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: scanner
          POSTGRES_PASSWORD: scanner_test_password
        run: |
          bin/rails db:create
          bin/rails db:schema:load
          bin/rails db:migrate

      - name: Run RSpec tests (with coverage)
        env:
          RAILS_ENV: test
          COVERAGE: "true"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: scanner
          POSTGRES_PASSWORD: scanner_test_password
        run: bundle exec rspec

      - name: Upload test coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
