services:
  postgres:
    image: postgres:18-alpine
    container_name: scanner_dev_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_dev_password_12345}
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8 --data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanner} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - scanner_network

  scanner:
    container_name: scanner_dev
    build:
      context: .
      dockerfile: ./Dockerfile.dev
    environment:
      RAILS_ENV: development
      RUBY_YJIT_ENABLE: "1"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env}"
      SOLID_QUEUE_IN_PUMA: "true"
      PORT: 3000
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_dev_password_12345}
    working_dir: /rails
    restart: always
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/rails
      - /rails/node_modules
      - /rails/tmp
      - /rails/log
    ports:
      - "80:3000"
    networks:
      - scanner_network

  mock-llm:
    container_name: mock-llm
    build:
      context: ./mock-llm
    ports:
      - "9292:9292"
    volumes:
      - ./mock-llm:/app
    command: ["bundle", "exec", "rackup", "--host", "0.0.0.0", "--port", "9292"]
    networks:
      - scanner_network

networks:
  scanner_network:
    name: scanner_network
    driver: bridge

volumes:
  postgres_data:
    driver: local
