services:
  postgres:
    image: postgres:18-alpine
    container_name: scanner_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in environment or .env file}
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8 --data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanner} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - scanner_network

  scanner:
    container_name: scanner
    image: ghcr.io/0din-ai/scanner:latest
    user: "1000:1000"
    environment:
      PLAYWRIGHT_BROWSERS_PATH: /opt/playwright-browsers
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env}"
      SOLID_QUEUE_IN_PUMA: "true"
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in environment or .env file}
    working_dir: /rails
    restart: always
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./storage:/rails/storage
    ports:
      - "${PORT:-80}:80"     # HTTP via Thruster
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/up"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - scanner_network

networks:
  scanner_network:
    name: scanner_network
    driver: bridge

volumes:
  postgres_data:
    driver: local
